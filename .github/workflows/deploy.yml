name: Build & Deploy Public Web

on:
  workflow_dispatch: {}
  push:
    branches: ["main"]
    paths:
      - "src/**"
      - "public/**"
      - "index.html"
      - "package.json"
      - "package-lock.json"
      - "Dockerfile"
      - ".dockerignore"
      - "nginx.conf"
      - "docker-compose.yml"
      - "vite.config.*"
      - "tailwind.config.*"
      - "postcss.config.*"
      - ".github/workflows/deploy.yml"

concurrency:
  group: public-web-development
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_PUBLIC_WEB: ghcr.io/sisc-it/sisc-public-web

jobs:
  build:
    name: Build & Push image
    runs-on: ubuntu-latest
    environment: development
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push public web
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: ${{ env.IMAGE_PUBLIC_WEB }}:latest
          build-args: |
            VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL }}
            VITE_CLUB_WEB_URL=${{ secrets.VITE_CLUB_WEB_URL }}

  deploy:
    name: Deploy to development server
    needs: [build]
    runs-on: ubuntu-latest
    environment: development
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Make .env file
        run: |
          echo "TAG=latest" > .env

      - name: Transfer compose files
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: "docker-compose.yml, .env"
          target: "/home/${{ secrets.SSH_USER }}/app/sisc-public-web/"

      - name: SSH deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script_stop: true
          script: |
            set -euo pipefail
            cd ~/app/sisc-public-web

            echo "${{ secrets.GHCR_READ_TOKEN }}" | docker login ghcr.io -u ${{ secrets.GHCR_READ_USER }} --password-stdin
            docker compose pull public-web
            docker compose up -d --remove-orphans public-web
            docker image prune -f
